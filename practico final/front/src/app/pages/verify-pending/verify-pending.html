<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        <i class="bi bi-envelope-paper display-4" style="color: var(--primary)"></i>
        <h3 class="mt-2 fw-bold">Verificá tu email</h3>
        <p class="text-muted">
          Te enviamos un enlace de verificación a
          @if (auth.user(); as user) {
            <strong>{{ user.email }}</strong>.
          } @else {
            tu correo.
          }
          Revisá tu bandeja de entrada (y el spam) para activar la cuenta.
        </p>

        @if (message) {
          <div class="alert alert-success d-flex align-items-center" role="alert">
            <i class="bi bi-check-circle me-2"></i>{{ message }}
          </div>
        }
        @if (error) {
          <div class="alert alert-danger d-flex align-items-center" role="alert">
            <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
          </div>
        }

        <button class="btn btn-primary w-100 mt-2" (click)="resend()" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-1" role="status"></span>
          }
          Reenviar email de verificación
        </button>

        <p class="mt-3 mb-0">
          <a routerLink="/">Ir al inicio</a>
        </p>
      </div>
    </div>
  </div>
</div>
