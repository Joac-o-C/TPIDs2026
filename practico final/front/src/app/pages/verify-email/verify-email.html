<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4 text-center">
        @switch (status()) {
          @case ('loading') {
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Verificando...</span>
            </div>
            <p class="mt-3 text-muted mb-0">Verificando tu email...</p>
          }
          @case ('success') {
            <i class="bi bi-check-circle display-4 text-success"></i>
            <h3 class="mt-2 fw-bold">¡Email verificado!</h3>
            <p class="text-muted">{{ message }}</p>
            <a routerLink="/login" class="btn btn-primary w-100">Ir a iniciar sesión</a>
          }
          @case ('error') {
            <i class="bi bi-x-circle display-4 text-danger"></i>
            <h3 class="mt-2 fw-bold">No se pudo verificar</h3>
            <p class="text-muted">{{ message }}</p>
            <a routerLink="/login" class="btn btn-outline-secondary w-100">Volver al login</a>
          }
        }
      </div>
    </div>
  </div>
</div>
