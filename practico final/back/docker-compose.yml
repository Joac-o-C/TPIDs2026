services:
  db:
    image: postgres:16
    container_name: tpids-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tpids
    ports:
      - '5433:5432'
    volumes:
      - tpids-pgdata:/var/lib/postgresql/data

volumes:
  tpids-pgdata:
